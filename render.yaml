services:
  - type: web
    name: maher-mobile-network-analyzer-api
    runtime: node
    plan: free
    buildCommand: cd backend && npm install
    startCommand: cd backend && npm start
    envVars:
      - key: NODE_VERSION
        value: 22.22.0
      - key: CORS_ORIGIN
        value: "*"
      - key: DB_FILE
        value: ./data/network-analyzer.sqlite

  - type: web
    name: maher-mobile-network-analyzer-web
    runtime: static
    buildCommand: cd frontend && npm install && npm run build
    staticPublishPath: frontend/dist
    envVars:
      - key: NODE_VERSION
        value: 22.22.0
      - key: VITE_API_BASE
        value: https://maher-mobile-network-analyzer-api.onrender.com
